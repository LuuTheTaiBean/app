<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px #00c6ff;
            color: white;
        }

        .btn-custom {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 198, 255, 0.4);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
        }

        a {
            color: #00c6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="login-card p-4 shadow-lg" style="width:400px;">
        <h3 class="text-center mb-4 fw-bold">
            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
        </h3>

        <form id="loginForm">

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="input-group mb-4">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>

                <span class="input-group-text toggle-password" style="cursor:pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <button type="submit" class="btn btn-custom w-100 py-2">
                Đăng nhập
            </button>
        </form>

        <div class="text-center mt-3">
            Chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </div>
    </div>
    <script>
        document.querySelector(".toggle-password").addEventListener("click", function () {
            const passwordInput = document.getElementById("password");
            const eyeIcon = this.querySelector("i");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.classList.remove("bi-eye");
                eyeIcon.classList.add("bi-eye-slash");
            } else {
                passwordInput.type = "password";
                eyeIcon.classList.remove("bi-eye-slash");
                eyeIcon.classList.add("bi-eye");
            }
        });
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoDmEDEuEQjmBAFnIA6_j-n0jpWi0Kr9Q",
            authDomain: "tai-s-app.firebaseapp.com",
            projectId: "tai-s-app",
            storageBucket: "tai-s-app.firebasestorage.app",
            messagingSenderId: "993650714379",
            appId: "1:993650714379:web:01711d0ce352cc5de7240e",
            measurementId: "G-0B79ERBBEP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("loginForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, "users", user.uid));

                if (userDoc.exists()) {
                    const data = userDoc.data();

                    if (data.isPaid) {
                        window.location.href = "app.html";
                    } else {
                        window.location.href = "payment.html";
                    }
                } else {
                    alert("Không tìm thấy dữ liệu người dùng!");
                }

            } catch (error) {
                alert("Sai email hoặc mật khẩu!");
            }
        });
    </script>

</body>

</html>
