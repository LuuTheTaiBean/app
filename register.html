<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Đăng ký tài khoản</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px #00c6ff;
            color: white;
        }

        .btn-custom {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 198, 255, 0.4);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
        }

        a {
            color: #00c6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /*  */
        .form-wrapper {
            position: relative;
        }

        .form-wrapper i.left-icon {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #ccc;
        }

        .form-wrapper input {
            padding-left: 45px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="register-card p-4 shadow-lg" style="width:420px;">
        <h3 class="text-center mb-4 fw-bold">
            <i class="bi bi-person-plus-fill"></i> Tạo tài khoản
        </h3>

        <form id="registerForm">

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" id="fullName" class="form-control" placeholder="Họ và tên" required>
            </div>


            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                <input type="date" id="dob" class="form-control" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                <input type="text" id="hometown" class="form-control" placeholder="Quê quán" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                <input type="text" id="phone" class="form-control" placeholder="Số điện thoại" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-bank"></i></span>
                <input type="text" id="bankAccount" class="form-control" placeholder="Số tài khoản" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                <input list="banks" id="bankName" class="form-control" placeholder="Tên ngân hàng" required>
                <datalist id="banks">
                    <option value="Vietcombank">
                    <option value="BIDV">
                    <option value="VietinBank">
                    <option value="Techcombank">
                    <option value="MB Bank">
                    <option value="ACB">
                    <option value="TPBank">
                    <option value="VPBank">
                    <option value="Sacombank">
                    <option value="Agribank">
                    <option value="SHB">
                    <option value="HDBank">
                    <option value="Eximbank">
                    <option value="SeABank">
                    <option value="Nam A Bank">
                    <option value="OceanBank">
                    <option value="LienVietPostBank">
                    <option value="SCB">
                </datalist>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
                <span class="input-group-text toggle-password" data-target="password" style="cursor:pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <div class="input-group mb-4">
                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Xác nhận mật khẩu"
                    required>
                <span class="input-group-text toggle-password" data-target="confirmPassword" style="cursor:pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <button type="submit" class="btn btn-custom w-100 py-2">
                Đăng ký
            </button>
        </form>

        <div class="text-center mt-3">
            Bạn chưa có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>
    <script>
        // Toggle hiển thị mật khẩu
        document.querySelectorAll(".toggle-password").forEach(icon => {
            icon.addEventListener("click", () => {
                const targetId = icon.getAttribute("data-target");
                const input = document.getElementById(targetId);
                const eyeIcon = icon.querySelector("i");

                if (input.type === "password") {
                    input.type = "text";
                    eyeIcon.classList.remove("bi-eye");
                    eyeIcon.classList.add("bi-eye-slash");
                } else {
                    input.type = "password";
                    eyeIcon.classList.remove("bi-eye-slash");
                    eyeIcon.classList.add("bi-eye");
                }
            });
        });
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoDmEDEuEQjmBAFnIA6_j-n0jpWi0Kr9Q",
            authDomain: "tai-s-app.firebaseapp.com",
            projectId: "tai-s-app",
            storageBucket: "tai-s-app.firebasestorage.app",
            messagingSenderId: "993650714379",
            appId: "1:993650714379:web:01711d0ce352cc5de7240e",
            measurementId: "G-0B79ERBBEP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("registerForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const fullName = document.getElementById("fullName").value;
            const dob = document.getElementById("dob").value;
            const hometown = document.getElementById("hometown").value;
            const phone = document.getElementById("phone").value;
            const bankAccount = document.getElementById("bankAccount").value;
            const bankName = document.getElementById("bankName").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Mật khẩu không khớp!");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName,
                    dob,
                    hometown,
                    phone,
                    bankAccount,
                    bankName,
                    email,
                    createdAt: new Date(),
                    isPaid: false
                });

                // alert("Đăng ký thành công!");
                window.location.href = "app.html";

            } catch (error) {
                alert(error.message);
            }
        });
    </script>

</body>

</html>
