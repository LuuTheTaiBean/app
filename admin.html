<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Quản lý User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 600px;
        }

        .table {
            color: white;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="admin-card shadow-lg">
        <h3 class="mb-4 text-center">⚙️ Danh sách thành viên</h3>

        <table class="table table-bordered text-center align-middle">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            doc,
            updateDoc,
            deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoDmEDEuEQjmBAFnIA6_j-n0jpWi0Kr9Q",
            authDomain: "tai-s-app.firebaseapp.com",
            projectId: "tai-s-app",
            storageBucket: "tai-s-app.firebasestorage.app",
            messagingSenderId: "993650714379",
            appId: "1:993650714379:web:01711d0ce352cc5de7240e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 🔒 Kiểm tra admin
        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== "luuthetay@gmail.com") {
                alert("Không có quyền truy cập!");
                window.location.href = "login.html";
            } else {
                loadUsers();
            }
        });

        async function loadUsers() {
            const snapshot = await getDocs(collection(db, "users"));
            const table = document.getElementById("userTable");
            table.innerHTML = "";

            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const uid = docSnap.id;

                // ❌ Nếu không có email thì xóa luôn khỏi Firestore
                if (!data.email) {
                    await deleteDoc(doc(db, "users", uid));
                    console.log("Đã xóa user rác:", uid);
                    continue; // bỏ qua không render
                }

                const isPaid = data.isPaid === true;

                const tr = document.createElement("tr");

                // EMAIL
                const emailTd = document.createElement("td");
                emailTd.innerText = data.email;

                // BUTTON
                const statusTd = document.createElement("td");
                const btn = document.createElement("button");

                if (isPaid) {
                    btn.className = "btn btn-success";
                    btn.innerText = "Bật";
                } else {
                    btn.className = "btn btn-danger";
                    btn.innerText = "Tắt";
                }

                btn.addEventListener("click", async () => {
                    await updateDoc(doc(db, "users", uid), {
                        isPaid: !isPaid
                    });
                    loadUsers();
                });

                statusTd.appendChild(btn);
                tr.appendChild(emailTd);
                tr.appendChild(statusTd);
                table.appendChild(tr);
            }
        }
    </script>

</body>

</html>
